<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Relatório · Vestibular UGB-FERP</title>
<style>
  :root{ --roxo:#7b3ff2; --azul:#0d3b9e; --azul2:#1657d6; --rosa:#ff2e93; }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(120% 90% at 12% 8%,#6d4be0 0%,rgba(109,75,224,0) 45%),
               radial-gradient(90% 80% at 100% 100%,#1f7fe0 0%,rgba(31,127,224,0) 50%),
               linear-gradient(150deg,#10307f,#0c1f57 60%,#0a1740);color:#eaf1ff}
  .card{width:100%;max-width:620px;background:rgba(10,24,70,.55);border:1px solid rgba(255,255,255,.14);
    border-radius:20px;padding:34px 32px;backdrop-filter:blur(8px);box-shadow:0 20px 60px rgba(0,0,0,.4)}
  h1{font-size:1.55rem;font-weight:800;margin-bottom:4px;
    background:linear-gradient(90deg,#8ec5ff,#ff8fce);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:#aebEdF;font-size:.92rem;margin-bottom:22px}
  .erro{background:rgba(255,46,147,.18);border:1px solid var(--rosa);color:#ffd6ea;
    padding:10px 14px;border-radius:10px;margin-bottom:18px;font-size:.9rem}
  .drop{border:2px dashed rgba(255,255,255,.35);border-radius:14px;padding:26px;text-align:center;
    cursor:pointer;transition:.2s;margin-bottom:8px;background:rgba(255,255,255,.03)}
  .drop:hover,.drop.hot{border-color:var(--rosa);background:rgba(255,46,147,.08)}
  .drop b{color:#fff} .drop small{color:#9fb0d8;display:block;margin-top:6px}
  #lista{list-style:none;margin:6px 0 16px;font-size:.85rem;color:#cfe0ff}
  #lista li{padding:4px 0;border-bottom:1px solid rgba(255,255,255,.07)}
  .row{display:flex;gap:14px;margin:6px 0 20px;flex-wrap:wrap}
  .fld{flex:1;min-width:180px}
  label{display:block;font-size:.8rem;color:#aebEdF;margin-bottom:6px}
  input[type=text],input[type=number]{width:100%;padding:11px 13px;border-radius:10px;border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.06);color:#fff;font-size:.95rem}
  input:focus{outline:none;border-color:var(--azul2)}
  .btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:1.02rem;font-weight:700;cursor:pointer;color:#fff;
    background:linear-gradient(90deg,var(--roxo),var(--azul2) 55%,var(--rosa));box-shadow:0 8px 24px rgba(123,63,242,.4)}
  .btn:hover{filter:brightness(1.08)} .btn:disabled{opacity:.6;cursor:wait}
  .foot{text-align:center;color:#8395c4;font-size:.72rem;margin-top:18px}
</style>
</head>
<body>
  <div class="card">
    <h1>Relatório do Vestibular</h1>
    <div class="sub">UGB-FERP · Volta Redonda — envie os 5 PDFs e gere a arte do dia.</div>
    {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}

    <form method="post" action="/gerar" enctype="multipart/form-data" id="form">
      <div class="drop" id="drop">
        <b>Clique ou arraste os 5 relatórios em PDF</b>
        <small>Lista de Inscritos · Totalizador · Aprovados · Matriculados · 1ª Mensalidade</small>
        <input type="file" name="pdfs" id="pdfs" accept="application/pdf" multiple hidden>
      </div>
      <ul id="lista"></ul>

      <div class="row">
        <div class="fld">
          <label>Semestre anterior</label>
          <input type="text" name="ano_anterior" value="2025.2" placeholder="2025.2">
        </div>
        <div class="fld">
          <label>Matriculados no semestre anterior</label>
          <input type="number" name="num_anterior" placeholder="ex.: 32" min="0">
        </div>
      </div>

      <button class="btn" id="btn" type="submit">Gerar relatório</button>
    </form>
    <div class="foot">Desenvolvido por Francisco Morais</div>
  </div>

<script>
  const drop=document.getElementById('drop'), inp=document.getElementById('pdfs'),
        lista=document.getElementById('lista'), form=document.getElementById('form'), btn=document.getElementById('btn');
  drop.onclick=()=>inp.click();
  ['dragover','dragenter'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add('hot')}));
  ['dragleave','drop'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove('hot')}));
  drop.addEventListener('drop',ev=>{ inp.files=ev.dataTransfer.files; mostrar(); });
  inp.addEventListener('change', mostrar);
  function mostrar(){
    lista.innerHTML='';
    [...inp.files].forEach(f=>{ const li=document.createElement('li'); li.textContent='📄 '+f.name; lista.appendChild(li); });
  }
  form.addEventListener('submit',()=>{ btn.disabled=true; btn.textContent='Processando...'; });
</script>
</body>
</html>
