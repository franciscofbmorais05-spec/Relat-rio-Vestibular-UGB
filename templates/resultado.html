<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório gerado · Vestibular UGB-FERP</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
  body{min-height:100vh;padding:28px;color:#eaf1ff;
    background:radial-gradient(120% 90% at 12% 8%,#6d4be0 0%,rgba(109,75,224,0) 45%),
               radial-gradient(90% 80% at 100% 100%,#1f7fe0 0%,rgba(31,127,224,0) 50%),
               linear-gradient(150deg,#10307f,#0c1f57 60%,#0a1740)}
  .wrap{max-width:1000px;margin:0 auto}
  h1{font-size:1.4rem;font-weight:800;margin-bottom:18px;
    background:linear-gradient(90deg,#8ec5ff,#ff8fce);-webkit-background-clip:text;background-clip:text;color:transparent}
  .grid{display:grid;grid-template-columns:1.4fr 1fr;gap:24px}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  img{width:100%;border-radius:14px;box-shadow:0 16px 50px rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.1)}
  .panel{background:rgba(10,24,70,.55);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:20px}
  table{width:100%;border-collapse:collapse;font-size:.9rem}
  td{padding:8px 6px;border-bottom:1px solid rgba(255,255,255,.08)}
  td.v{text-align:right;font-weight:700;color:#fff}
  .acts{display:flex;gap:12px;margin-top:18px;flex-wrap:wrap}
  a.btn{flex:1;text-align:center;text-decoration:none;padding:12px;border-radius:11px;font-weight:700;color:#fff;
    background:linear-gradient(90deg,#7b3ff2,#1657d6 55%,#ff2e93)}
  a.ghost{flex:1;text-align:center;text-decoration:none;padding:12px;border-radius:11px;font-weight:600;color:#cfe0ff;
    border:1px solid rgba(255,255,255,.25)}
  .diag{margin-top:14px;font-size:.76rem;color:#9fb0d8}
</style>
</head>
<body>
  <div class="wrap">
    <h1>✅ Relatório gerado</h1>
    <div class="grid">
      <div><img src="data:image/png;base64,{{ img_b64 }}" alt="Relatório do Vestibular"></div>
      <div class="panel">
        <table>
          {% for nome, val in linhas %}
          <tr><td>{{ nome }}</td><td class="v">{{ val }}</td></tr>
          {% endfor %}
        </table>
        <div class="acts">
          <a class="btn" download="Quantitativo_Vestibular_2026_2.png"
             href="data:image/png;base64,{{ img_b64 }}">Baixar PNG</a>
          <a class="ghost" href="/">Gerar outro</a>
        </div>
        <div class="diag">Inscritos brutos: {{ diag.bruto }} · testes removidos: {{ diag.testes }} · duplicidades: {{ diag.duplicidades }}</div>
      </div>
    </div>
  </div>
</body>
</html>
